name: Daily maintainer update

on:
  workflow_dispatch:
    inputs:
      fetch:
        description: Fetch public sources instead of static catalog-only candidates
        required: false
        default: 'true'
  schedule:
    - cron: '10 1 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install pyyaml
      - name: Run maintainer pipeline
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%F)
          FETCH_FLAG="--fetch"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.fetch }}" != "true" ]; then
            FETCH_FLAG=""
          fi
          python3 scripts/run_daily_update.py --date "$DATE" --min-accepted 10 $FETCH_FLAG
      - name: Validate generated changes
        run: |
          python3 scripts/validate_data.py
          python3 scripts/generate_readme.py --check
          python3 -m unittest discover tests
          git diff --check
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.MAINTAINER_PAT || github.token }}
          commit-message: "chore: daily Chinese AI models update"
          title: "Daily update: Chinese AI models and ecosystem links"
          body: |
            Automated daily update generated by awesome-chinese-ai-models-maintainer.

            The run creates a daily PR even when fewer than 10 updates are accepted; the target is tracked in the run summary, not used as a hard gate.

            Validation:
            - data validation passed
            - README generated sections checked
            - maintainer unit tests passed
            - git diff whitespace check passed

            Review source quality before merging.
          branch: bot/daily-awesome-update
          labels: daily-update, automation
          delete-branch: true
