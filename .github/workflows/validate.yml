name: Validate data

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install pyyaml
      - name: Validate data
        run: python3 scripts/validate_data.py
      - name: Validate source catalog
        run: python3 -c "from scripts.maintainer import load_source_catalog; print(len(load_source_catalog('agent/source-catalog.yaml')))"
      - name: Run maintainer unit tests
        run: python3 -m unittest discover tests
      - name: Check README generated sections
        run: python3 scripts/generate_readme.py --check
      - name: Check git diff cleanliness
        run: git diff --check
