    - provider_id: tencent-hunyuan
      name: Hunyuan
      global: partial
      russia: unknown
      middle_east: unknown
      sea: partial
      crypto_payment: no
      notes: Access through Tencent Cloud; open weights downloadable worldwide.
    - provider_id: bytedance-doubao
      name: Doubao
